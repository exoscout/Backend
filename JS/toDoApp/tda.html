<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="tda.css">
</head>
<body>
    <table>
        <tr><td colspan="2"><h2 class="text" id="header">TO-DO LIST</h2></td></tr>
        <tr><td colspan="2">    
                <div class="container" id="addTaskContainer">
                    <input type="text" id="taskInput" placeholder="Add a new task...">
                    <input type="date" id="dueDateInput" placeholder="Due date">
                    <span><select name="priority" id="priorityInput">
                        <option value="Priority" selected disabled hidden>Priority</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select></span>
                    <button id="addTaskBtn">Add Task</button>
                </div>
        </td></tr>
        <tr>
            <td>
                <div class="container" id="taskListContainer">
                    <h3 class="text">Pending Tasks</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Due Date</th>
                                <th>Priority</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="taskList">

                        </tbody>
                    </table>
                </div>
            </td>
            <td>
                <div class="container" id="taskListContainer">
                    <h3 class="text">Completed Tasks</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Due Date</th>
                                <th>Priority</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="completedTaskList">

                        </tbody>
                    </table>
                </div>
            </td>
        </tr>
        <tr><td></td><td><button id="clearTasksBtn">Clear Completed Tasks</button></td></tr>
    </table>
    

    <div id="taskContCont">
        
        
    </div>
    
    

    <script src="tda.js"></script>
</body>
</html>
