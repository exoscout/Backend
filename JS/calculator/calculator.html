<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="display"></div>
    <div id="calculator">
        <div id="buttonContainer">
            <button id="num1" class="button">1</button>
            <button id="num2" class="button" >2</button>
            <button id="num3" class="button">3</button>
            <br>
            <button id="num4" class="button">4</button>
            <button id="num5" class="button">5</button>
            <button id="num6" class="button">6</button><br>
            <button id="num7" class="button">7</button>
            <button id="num8" class="button">8</button>
            <button id="num9" class="button">9</button><br>
            <button id="clear" class="button">C</button>
            <button id="num0" class="button">0</button>
            <button id="equals" class="button">=</button>
            <br><br>
            <button id="add" class="button">+</button>
            <button id="subtract" class="button">-</button>
            <button id="multiply" class="button">×</button>
            <button id="divide" class="button">÷</button>
        </div>
    </div>

    <script src="calc.js"></script>
</body>
</html>
